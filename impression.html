<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiche — LogBookMap</title>

  <!-- Leaflet : la librairie qui affiche la carte interactive -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- MapLibre GL : moteur de carte "vectorielle" (fond personnalisable) -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

  <!-- Polices médiévales (mêmes choix que dans l'application) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" crossorigin="anonymous"
        href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Pirata+One&display=swap" />

  <!-- Nos styles à nous (partagés avec l'application principale) -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-impression">

  <!-- Barre de contrôle : préparation, puis cadrage (zoom précis, rotation)
       + bouton Imprimer. Jamais imprimée (masquée en @media print). -->
  <div id="barre-impression" class="barre-impression">
    <span id="barre-texte">Préparation de l'affiche…</span>
    <span id="barre-reglages" class="barre-reglages" hidden>
      <label>Zoom <input id="champ-zoom" type="number" step="1" min="1" value="100" /> %</label>
      <label>Rotation <input id="champ-rotation" type="number" step="1" value="0" /> °</label>
    </span>
    <button id="btn-image" class="barre-btn-imprimer" hidden>🖼️ Image PNG</button>
    <button id="btn-imprimer" class="barre-btn-imprimer" hidden>🖨️ Imprimer</button>
  </div>

  <!-- Carte principale (occupe la première page) -->
  <div id="zone-carte" class="zone-carte-impression">
    <div id="map" class="map"></div>
    <div id="parchemin" class="parchemin"></div>
    <div id="carte-titre" class="carte-titre" hidden></div>
    <!-- Bordure décorative (activée via le panneau Fond de carte → Décor) -->
    <div id="bordure-carte" class="bordure-carte" hidden></div>
    <!-- Rose des vents : indique le nord quand la carte est tournée (imprimée) -->
    <div id="rose-vents" class="rose-vents" hidden>
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" fill="rgba(255,255,255,0.85)" stroke="#2f3b34" stroke-width="1"/>
        <polygon points="20,5 24,22 20,19 16,22" fill="#d35438"/>
        <polygon points="20,35 24,22 20,25 16,22" fill="#2f3b34" opacity="0.4"/>
        <text x="20" y="14" text-anchor="middle" font-size="8" font-weight="bold"
              font-family="sans-serif" fill="#2f3b34">N</text>
      </svg>
    </div>
  </div>

  <!-- Zone de mesure hors écran : chaque carte souvenir y est construite une
       première fois (à la largeur d'une unité de grille) pour mesurer sa
       hauteur avant de répartir les souvenirs en mosaïque sur les pages.
       Pas display:none pour que les mini-cartes Leaflet puissent s'y
       initialiser normalement. -->
  <div id="impression-mesure"></div>

  <!-- Souvenirs, en mosaïque, sur les pages suivantes -->
  <div id="impression">
    <h2 id="impression-titre-souvenirs" class="impression-titre-souvenirs">Souvenirs du voyage</h2>
    <div id="impression-souvenirs" class="impression-souvenirs"></div>
  </div>

  <!-- Leaflet (le moteur de la carte) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- MapLibre GL + le pont qui l'intègre dans Leaflet (fond vectoriel) -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.22/leaflet-maplibre-gl.js"></script>

  <!-- Notre code : construit tout, seul, à partir des données lues dans window.opener -->
  <script src="impression.js"></script>
</body>
</html>
